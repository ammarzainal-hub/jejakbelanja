<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExpensePro & EV Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .chart-container    { position: relative; height: 180px; width: 100%; }
    .chart-container-lg { position: relative; height: 220px; width: 100%; }
    .loading-overlay    { background: rgba(255,255,255,0.85); display: none; }
    th.sortable { cursor: pointer; transition: background 0.2s; }
    th.sortable:hover { background: #f8fafc; }
    .action-btn  { transition: all 0.2s; z-index: 10; position: relative; }
    .action-icon { width: 22px; height: 22px; stroke-width: 1.5; }
    .nav-active-sum { color: #6366f1; border-top: 3px solid #6366f1; background: #eef2ff; }
    .nav-active-exp { color: #10b981; border-top: 3px solid #10b981; background: #f0fdf4; }
    .nav-active-ev  { color: #3b82f6; border-top: 3px solid #3b82f6; background: #eff6ff; }
    .summary-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
    
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      padding: 16px 24px;
      border-radius: 16px;
      font-weight: bold;
      font-size: 14px;
      color: white;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      animation: slideIn 0.3s ease-out;
      max-width: 400px;
    }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }
    .toast.info { background: #3b82f6; }
    
    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(400px); opacity: 0; }
    }
    .toast.hide { animation: slideOut 0.3s ease-out forwards; }
    
    .category-row {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .category-row:hover {
      background: #f8fafc;
    }
    .category-expanded {
      max-height: 500px;
      opacity: 1;
      transition: max-height 0.3s ease, opacity 0.3s ease;
    }
    .category-collapsed {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
    }
    
    @keyframes countUp {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .count-animate {
      animation: countUp 0.5s ease-out;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .pulse-once {
      animation: pulse 0.5s ease-out;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-700 pb-24">

  <div id="loader" class="fixed inset-0 z-50 loading-overlay flex items-center justify-center">
    <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-indigo-600"></div>
  </div>

  <nav class="fixed bottom-0 inset-x-0 bg-white border-t z-40 flex justify-around items-center h-16 shadow-lg">
    <button onclick="switchTab('summary')" id="nav-summary" class="flex flex-col items-center gap-1 w-full h-full justify-center nav-active-sum">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      <span class="text-[10px] font-bold uppercase">Ringkasan</span>
    </button>
    <button onclick="switchTab('expense')" id="nav-expense" class="flex flex-col items-center gap-1 w-full h-full justify-center text-slate-400">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span class="text-[10px] font-bold uppercase">Belanja</span>
    </button>
    <button onclick="switchTab('ev')" id="nav-ev" class="flex flex-col items-center gap-1 w-full h-full justify-center text-slate-400">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      <span class="text-[10px] font-bold uppercase">EV Cas</span>
    </button>
  </nav>
